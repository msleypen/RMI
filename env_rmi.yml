name: heatwaves_rmi
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - xarray
  - xclim
  - pandas
  - matplotlib
  - scipy
  - zarr<3          # <-- CRITICAL: Forces Zarr v2
  - esmpy
  - pip
  - pyextremes
  - pip:
    - numcodecs<0.16 # <-- CRITICAL: Prevents the blosc compression crash
    - ValEnsPy